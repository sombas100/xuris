name: xuris-test

services:
  postgres:
    image: postgres:17-alpine
    container_name: xuris-test-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xuris_test

    ports:
      - "5434:5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d xuris_test",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

    tmpfs:
      - /var/lib/postgresql/data

    networks:
      - xuris-test-network

networks:
  xuris-test-network:
    name: xuris-test-network
    driver: bridge