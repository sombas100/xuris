name: xuris

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    image: xuris-backend:latest
    container_name: xuris-backend

    restart: unless-stopped

    env_file:
      - .env.production

    ports:
      - "5001:5000"

    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:5000/health').then(response => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s